name: Keep Render Alive

on:
  schedule:
    # Ping toutes les 14 minutes (juste sous la limite de 15 min de Render)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  ping:
    name: Ping EventHub Backend
    runs-on: ubuntu-latest

    steps:
      - name: Ping le serveur Render
        run: |
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            https://eventhub-backend-qulw.onrender.com/)

          echo "HTTP Status: $RESPONSE"
          echo "Response body: $(cat /tmp/response.txt)"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 400 ]; then
            echo "Serveur actif (HTTP $RESPONSE)"
          else
            echo "Serveur injoignable (HTTP $RESPONSE)"
            exit 1
          fi
